<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Attendance &amp; Leave - HWMS</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link href="css/layout.css" rel="stylesheet"/>
  <link href="css/attendance_leave.css" rel="stylesheet"/>
</head>
<body>

<div class="toast-wrap" id="toastWrap">
  <i class="bi" id="toastIcon"></i>
  <span id="toastMsg"></span>
</div>

<div class="overlay" id="overlay"></div>

<div class="shell">

  <aside class="sidebar" id="sidebar">
    <a href="templates/dashboard.html" class="sidebar-brand">
      <div class="brand-icon"><i class="bi bi-heart-pulse-fill"></i></div>
      <div>
        <div class="brand-name">HWMS</div>
        <div class="brand-sub">Healthcare Workforce</div>
      </div>
    </a>
    <nav class="nav-list">
      <div class="nav-label">Main Menu</div>
      <a href="templates/dashboard.html" class="nav-item"><i class="bi bi-grid-1x2"></i> Dashboard</a>
      <a href="templates/workforce.html" class="nav-item"><i class="bi bi-people"></i> Workforce</a>
      <a href="templates/attendance_leave.html" class="nav-item active"><i class="bi bi-calendar-check"></i> Attendance &amp; Leave</a>
      <a href="templates/training_reports.html" class="nav-item"><i class="bi bi-mortarboard"></i> Training &amp; Reports</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-avatar" id="sfAvatar">A</div>
      <div>
        <div class="user-name" id="sfName">Admin User</div>
        <div class="user-role" id="sfRole">Admin</div>
      </div>
      <button class="logout-btn" id="logoutBtn" aria-label="Logout"><i class="bi bi-box-arrow-right"></i></button>
    </div>
  </aside>

  <div class="main">

    <header class="topbar">
      <div class="topbar-left">
        <button class="hamburger" id="hamburger" aria-label="Open menu"><i class="bi bi-list"></i></button>
        <div>
          <div class="page-title">Attendance &amp; Leave</div>
          <div class="page-sub">Track attendance and manage leave requests</div>
        </div>
      </div>
      <div class="topbar-right">
        <button class="icon-btn" aria-label="Notifications">
          <i class="bi bi-bell"></i><span class="notif-dot"></span>
        </button>
        <div class="top-avatar" id="topAvatar">A</div>
        <div class="top-user d-none d-md-block">
          <div class="top-name" id="topName">Admin User</div>
          <div class="top-role" id="topRole">Admin</div>
        </div>
      </div>
    </header>

    <main class="page-body">

      <div class="tabs">
        <button class="tab-btn active" data-tab="attendance">
          <i class="bi bi-calendar-check"></i> Attendance
        </button>
        <button class="tab-btn" data-tab="leave">
          <i class="bi bi-calendar-x"></i> Leave Requests
          <span class="count-badge" id="pendingLeaveBadge">3</span>
        </button>
      </div>

      <div class="tab-panel active" id="tab-attendance">

        <div class="toolbar">
          <div class="filter-group">
            <label class="filter-label"><i class="bi bi-calendar3 me-1"></i>Date</label>
            <input type="date" class="filter-select" id="attDateFilter"/>
          </div>
          <div class="filter-group">
            <label class="filter-label"><i class="bi bi-building me-1"></i>Department</label>
            <select class="filter-select" id="attDeptFilter">
              <option value="">All Departments</option>
              <option>Emergency</option>
              <option>ICU</option>
              <option>Surgery</option>
              <option>Paediatrics</option>
              <option>Radiology</option>
              <option>HR</option>
            </select>
          </div>
          <button class="btn-outline" id="attClearBtn"><i class="bi bi-x-circle me-1"></i>Clear</button>
          <div class="ms-auto d-flex gap-2">
            <div class="chip chip-present"><i class="bi bi-check-circle-fill me-1"></i><span id="presentCount">0</span> Present</div>
            <div class="chip chip-absent"><i class="bi bi-x-circle-fill me-1"></i><span id="absentCount">0</span> Absent</div>
          </div>
        </div>

        <div class="table-box">
          <table class="data-table" id="attTable">
            <thead>
              <tr>
                <th>Employee</th>
                <th>Department</th>
                <th>Date</th>
                <th>Check-in</th>
                <th>Check-out</th>
                <th>Hours</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="attTableBody"></tbody>
          </table>
          <div class="pagination">
            <span id="attPaginationInfo">Showing 1–6 of 12</span>
            <div class="page-btns" id="attPageBtns"></div>
          </div>
        </div>

      </div>

      <div class="tab-panel" id="tab-leave">

        <div class="toolbar">
          <select class="filter-select" id="leaveStatusFilter">
            <option value="">All Status</option>
            <option value="Pending">Pending</option>
            <option value="Approved">Approved</option>
            <option value="Rejected">Rejected</option>
          </select>
          <select class="filter-select" id="leaveTypeFilter">
            <option value="">All Types</option>
            <option>Annual Leave</option>
            <option>Sick Leave</option>
            <option>Study Leave</option>
            <option>Maternity</option>
            <option>Paternity</option>
            <option>Emergency</option>
          </select>
        </div>

        <div class="leave-grid" id="leaveCardsGrid"></div>

      </div>

    </main>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="static/js/layout.js"></script>
<script src="static/js/attendance_leave.js"></script>
</body>
</html>
